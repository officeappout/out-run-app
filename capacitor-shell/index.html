<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Out Run</title>
    <style>
      :root { color-scheme: light; }
      html, body {
        margin: 0; padding: 0; height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: #ffffff;
        color: #111827;
      }
      .wrap {
        height: 100%;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        text-align: center; gap: 12px; padding: 24px;
      }
      .dot {
        width: 10px; height: 10px; border-radius: 9999px;
        background: #00BAF7; animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: .35; transform: scale(1); }
        50%      { opacity: 1;   transform: scale(1.4); }
      }
      h1 { margin: 0; font-size: 18px; font-weight: 800; }
      p  { margin: 0; font-size: 13px; color: #6B7280; max-width: 280px; }
      a  { margin-top: 12px; color: #00BAF7; font-weight: 700; text-decoration: none; font-size: 13px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="dot" aria-hidden="true"></div>
      <h1>Out Run</h1>
      <p>אין חיבור לאינטרנט. ודא שאתה מחובר לרשת ופתח את האפליקציה מחדש.</p>
      <a href="https://app.appout.co.il">פתח באתר</a>
    </div>
    <script>
      // If we got here in production it means server.url failed. Try once
      // more after a beat in case it was a transient blip.
      setTimeout(function () {
        if (window.location.protocol === 'capacitor:' || window.location.protocol === 'file:') {
          // Bundled shell — leave the user with the link.
          return;
        }
        window.location.reload();
      }, 4000);
    </script>
  </body>
</html>
